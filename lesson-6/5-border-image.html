<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Border Image | COMP1054 Web User Interface Design</title>
	<link rel="stylesheet" href="css/border-image.css" />
	<script src="js/jquery.js"></script>
	<style>
		/* CSS border-image-repeat example
		Thanks to Chris Coyier (https://css-tricks.com/almanac/properties/b/border-image/) */

		/* STEP 1: Examine the image we will use - 'img/doily.png' */
		.bordered-box {
			border: 35px solid pink;
			height: 40vh;
			width: 40vw;
			
			/* STEP 2: Set the border-image-source */
			border-image-source: url('img/doily.png');
			/* STEP 3: Set the border-image slice, width, and outset */
			border-image-slice: 30;
			border-image-width: auto;
			border-image-outset: 10px;
			/* STEP 4: Set the border-image-repeat (stretch | repeat | round | space) */
			border-image-repeat: round;
		}

		body {
			font-family: sans-serif;
			background-color: #1D1F1F;
		}

		div {
			margin: 1em auto;
			/* em is a relative unit that is based on the font size of the element. In this case, it will be based on the font size of the body element, which is inherited by the div. So if the font size of the body is 16px, then 1em will be equal to 16px. This allows for more flexible and scalable layouts, as the spacing will adjust based on the font size of the element. */

			/* rem is also a relative unit, but it is based on the font size of the root element (html) instead of the current element. So if the font size of the html element is 16px, then 1rem will be equal to 16px regardless of the font size of the body or any other element. This can be useful for creating consistent spacing across an entire page, as it will not be affected by changes in font size at different levels of the document. */
		}

		div h1 {
			color: white;
			text-align: center;
		}
	</style>
</head>
<body>
	<div class="bordered-box">
		<h1>CSS Border Image</h1>
	</div>
</body>
</html>
